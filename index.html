<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBook</title>
    <link rel="icon" type="image/x-icon" href="images/social-logo.png" class="icon-logo">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-left">
            <a href="/" class="nav-logo" onclick="router.navigate('/', event)">
                <img src="images/logo.png" class="logo">
            </a>
            <ul>
                <li>
                    <a href="/" onclick="router.navigate('/', event)" class="nav-icon" data-active="home">
                        <i class="fas fa-home"></i>
                        <span class="nav-label">Home</span>
                    </a>
                </li>
                <li class="messenger-icon">
                    <a href="/messenger" onclick="router.navigate('/messenger', event)" class="nav-icon" data-active="messenger">
                        <i class="fas fa-comment-dots"></i>
                        <span class="nav-label">Messenger</span>
                        <span class="message-count">3</span>
                    </a>
                </li>
                <li>
                    <a href="/notifications" onclick="router.navigate('/notifications', event)" class="nav-icon" data-active="notifications">
                        <i class="fas fa-bell"></i>
                        <span class="nav-label">Notifications</span>
                        <span class="notification-badge">5</span>
                    </a>
                </li>
                <li>
                    <a href="/watch" onclick="router.navigate('/watch', event)" class="nav-icon" data-active="watch">
                        <i class="fas fa-play-circle"></i>
                        <span class="nav-label">Watch</span>
                    </a>
                </li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="search" placeholder="Search SocialBook" id="search-input">
            </div>
            <div class="nav-user-icon online" onclick="settingsMenuToggle()">
                <img src="images/profile-pic.png">
            </div>
        </div>

        <!-- Settings Menu -->
        <div class="settings-menu">
            <div id="dark-btn">
                <span></span>
            </div>
            <div class="settings-menu-inner">
                <div class="user-profile">
                    <img src="images/profile-pic.png">
                    <div>
                        <p>Abebe Tekola</p>
                        <a href="/profile" onclick="router.navigate('/profile', event)">See your Profile</a>
                    </div>
                </div>
                <hr>
                <div class="user-profile">
                    <img src="images/feedback.png">
                    <div>
                        <p>Give Feedback</p>
                        <a href="#">Help us to improve</a>
                    </div>
                </div>
                <hr>
                <div class="settings-links">
                    <img src="images/setting.png" class="settings-icon">
                    <a href="#">Settings & Privacy <i class="fas fa-chevron-right"></i></a>
                </div>
                <div class="settings-links">
                    <img src="images/help.png" class="settings-icon">
                    <a href="#">Help & Support <i class="fas fa-chevron-right"></i></a>
                </div>
                <div class="settings-links">
                    <img src="images/display.png" class="settings-icon">
                    <a href="#" id="toggle-dark-mode">Dark Mode <i class="fas fa-chevron-right"></i></a>
                </div>
                <div class="settings-links">
                    <img src="images/logout.png" class="settings-icon">
                    <a href="#" onclick="logout()">Logout <i class="fas fa-chevron-right"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container">
        <!-- Left Sidebar -->
        <div class="left-sidebar" id="left-sidebar">
            <!-- Will be loaded dynamically -->
        </div>

        <!-- Main Content Area -->
        <div class="main-content" id="main-content">
            <!-- Content will be loaded here dynamically -->
            <div id="page-content"></div>
        </div>

        <!-- Right Sidebar -->
        <div class="right-sidebar" id="right-sidebar">
            <!-- Will be loaded dynamically -->
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Copyright 2024 - SocialBook</p>
    </div>

    <!-- Scripts -->
    <script src="router.js"></script>
    <script src="script.js"></script>
</body>
</html>
